name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artisangps_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/artisangps_test
          JWT_SECRET_KEY: supersecretkey_min_32_characters_123456
          JWT_EXPIRE_DAYS: 7
          ANTHROPIC_API_KEY: sk-ant-dummy-key
          FRONTEND_URL: http://localhost:5173
          ENVIRONMENT: testing
        run: pytest backend/tests/ -v
